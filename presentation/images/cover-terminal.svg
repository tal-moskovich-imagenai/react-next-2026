<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="glow-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF9C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00FF9C" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/>
  </g>

  <!-- Glow blob behind terminal -->
  <ellipse cx="600" cy="340" rx="380" ry="200" fill="url(#glow-teal)" opacity="0.6"/>

  <!-- Terminal window -->
  <g transform="translate(180, 120)">
    <!-- Window shadow -->
    <rect x="8" y="8" width="840" height="450" rx="12" fill="black" opacity="0.5"/>
    <!-- Window body -->
    <rect width="840" height="450" rx="12" fill="#0D1117" stroke="#1E2733" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="840" height="38" rx="12" fill="#161B22"/>
    <rect y="26" width="840" height="12" fill="#161B22"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="19" r="6" fill="#FE4A49"/>
    <circle cx="40" cy="19" r="6" fill="#FFBD2E"/>
    <circle cx="60" cy="19" r="6" fill="#27C93F"/>
    <!-- Tab title -->
    <text x="420" y="24" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#6E7681">react-terminal-demo -- tsx</text>

    <!-- Terminal content -->
    <g transform="translate(32, 60)" font-family="'SF Mono', 'Fira Code', monospace" font-size="14">

      <!-- Line 1: prompt -->
      <text y="0" fill="#00FF9C">$</text>
      <text x="18" y="0" fill="#F3EFF5"> npm run dev</text>

      <!-- Line 2: blank -->
      <text y="26" fill="#6E7681"> </text>

      <!-- AI Terminal header box (drawn with SVG lines, not box-drawing chars) -->
      <line x1="16" y1="42" x2="760" y2="42" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
      <text x="52" y="68" fill="#00FF9C" font-weight="bold" font-size="15">AI Terminal</text>
      <text x="200" y="68" fill="#6E7681" font-size="13">  model: gpt-4o-mini</text>
      <line x1="16" y1="80" x2="760" y2="80" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>

      <!-- Message: user -->
      <text y="116" fill="#F5C518" font-weight="bold">You</text>
      <text y="138" x="16" fill="#F3EFF5">  What is React?</text>

      <!-- Message: AI streaming -->
      <text y="174" fill="#00FF9C" font-weight="bold">AI</text>
      <text y="196" x="16" fill="#F3EFF5">  React is a JavaScript library for building</text>
      <text y="222" x="16" fill="#F3EFF5">  user interfaces -- including this terminal.</text>

      <!-- Cursor blink -->
      <rect x="16" y="248" width="8" height="16" fill="#00FF9C" filter="url(#glow)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text y="261" fill="#00FF9C">$</text>
      <text x="32" y="261" fill="#F3EFF5"> </text>

      <!-- Spinner hint -->
      <text y="300" fill="#6E7681">   Thinking...</text>

    </g>
  </g>

  <!-- React atom logo: top right, large, faint -->
  <g transform="translate(940, 80)" opacity="0.08" filter="url(#soft-glow)">
    <circle cx="100" cy="120" r="12" fill="#00D4FF"/>
    <ellipse cx="100" cy="120" rx="80" ry="28" fill="none" stroke="#00D4FF" stroke-width="2" transform="rotate(0, 100, 120)"/>
    <ellipse cx="100" cy="120" rx="80" ry="28" fill="none" stroke="#00D4FF" stroke-width="2" transform="rotate(60, 100, 120)"/>
    <ellipse cx="100" cy="120" rx="80" ry="28" fill="none" stroke="#00D4FF" stroke-width="2" transform="rotate(120, 100, 120)"/>
  </g>

  <!-- Bottom: ANSI escape sequence hint -->
  <g transform="translate(0, 620)" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" opacity="0.3">
    <text x="185" fill="#00FF9C">\x1b[32m</text>
    <text x="280" fill="#F3EFF5">Hello, ReactNext</text>
    <text x="430" fill="#00FF9C">\x1b[0m</text>
    <text x="490" fill="#6E7681">-&gt; React components become ANSI bytes</text>
  </g>
</svg>
