<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F3EFF5" opacity="0.7"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00FF9C"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00D4FF"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#B39DDB"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#0D1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#F3EFF5" font-weight="bold">ANSI Escape Sequences</text>
  <text x="450" y="58" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#6E7681">How Ink talks to your terminal</text>

  <!-- Raw bytes box -->
  <g transform="translate(50, 90)">
    <rect width="800" height="60" rx="8" fill="#0A0E17" stroke="#1E2733" stroke-width="1"/>
    <text x="20" y="22" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#6E7681">raw bytes:</text>

    <!-- \x1b[ -->
    <text x="110" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#FE4A49" font-weight="bold">\x1b[</text>
    <!-- 32 -->
    <text x="188" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#00FF9C" font-weight="bold">32</text>
    <!-- m -->
    <text x="222" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#FE4A49" font-weight="bold">m</text>
    <!-- space -->
    <text x="248" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#F3EFF5"> </text>
    <!-- Hello -->
    <text x="264" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#F3EFF5" font-weight="bold">Hello, ReactNext!</text>
    <!-- \x1b[0m -->
    <text x="582" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#FE4A49" font-weight="bold">\x1b[</text>
    <text x="660" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#B39DDB" font-weight="bold">0</text>
    <text x="680" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="20" fill="#FE4A49" font-weight="bold">m</text>
  </g>

  <!-- Annotation arrows -->
  <!-- ESC sequence -->
  <line x1="142" y1="150" x2="142" y2="195" stroke="#FE4A49" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="60" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#FE4A49">\x1b[ = ESC</text>
  <text x="60" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">Control Sequence</text>
  <text x="60" y="249" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">Introducer</text>

  <!-- 32 = green -->
  <line x1="204" y1="150" x2="204" y2="195" stroke="#00FF9C" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="162" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#00FF9C">32 = green</text>
  <text x="162" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">foreground</text>
  <text x="162" y="249" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">color code</text>

  <!-- m = end -->
  <line x1="233" y1="150" x2="233" y2="195" stroke="#F3EFF5" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <text x="242" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#F3EFF5" opacity="0.7">m = end</text>
  <text x="242" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">of sequence</text>

  <!-- reset -->
  <line x1="660" y1="150" x2="660" y2="195" stroke="#B39DDB" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="620" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#B39DDB">0 = reset</text>
  <text x="620" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6E7681">all styles</text>

  <!-- Rendered result -->
  <g transform="translate(50, 295)">
    <text x="0" y="0" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#6E7681">terminal renders:</text>
    <rect x="0" y="12" width="800" height="60" rx="8" fill="#0A1410" stroke="#00FF9C" stroke-width="1.5"/>
    <text x="20" y="52" font-family="'SF Mono', 'Fira Code', monospace" font-size="24" fill="#00FF9C" font-weight="bold" filter="url(#glow)">Hello, ReactNext!</text>
  </g>

  <!-- More examples -->
  <g transform="translate(50, 395)" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
    <text x="0" y="0" fill="#6E7681">other sequences:</text>
    <text x="0" y="24" fill="#FE4A49">\x1b[2J</text>
    <text x="90" y="24" fill="#6E7681">= clear screen</text>
    <text x="240" y="24" fill="#00D4FF">\x1b[3;10H</text>
    <text x="360" y="24" fill="#6E7681">= move cursor to row 3, col 10</text>
    <text x="600" y="24" fill="#B39DDB">\x1b[1m</text>
    <text x="660" y="24" fill="#6E7681">= bold</text>
  </g>

  <!-- Ink writes all of this for you label -->
  <g transform="translate(280, 445)">
    <rect width="340" height="26" rx="6" fill="#0D2218" stroke="#00FF9C" stroke-width="1"/>
    <text x="170" y="18" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#00FF9C">Ink writes all of this. You write React.</text>
  </g>
</svg>
